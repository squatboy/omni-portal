apiVersion: v1
kind: Namespace
metadata:
  name: omni
  labels:
    app.kubernetes.io/name: omni
    app.kubernetes.io/part-of: omni
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: omni-reader
  namespace: omni
  labels:
    app.kubernetes.io/name: omni
    app.kubernetes.io/part-of: omni
---
apiVersion: v1
kind: Secret
metadata:
  name: omni-reader-token
  namespace: omni
  labels:
    app.kubernetes.io/name: omni
    app.kubernetes.io/part-of: omni
  annotations:
    kubernetes.io/service-account.name: omni-reader
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: omni-readonly
  labels:
    app.kubernetes.io/name: omni
    app.kubernetes.io/part-of: omni
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - services
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: omni-readonly
  labels:
    app.kubernetes.io/name: omni
    app.kubernetes.io/part-of: omni
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: omni-readonly
subjects:
  - kind: ServiceAccount
    name: omni-reader
    namespace: omni
