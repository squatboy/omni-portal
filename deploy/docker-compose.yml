services:
  postgres:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omni}
      POSTGRES_USER: ${POSTGRES_USER:-omni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  omni:
    image: ghcr.io/squatboy/omni-frontend:${OMNI_VERSION:?set OMNI_VERSION}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      API_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_started

  backend:
    image: ghcr.io/squatboy/omni-backend:${OMNI_VERSION:?set OMNI_VERSION}
    restart: unless-stopped
    cap_add:
      - NET_RAW
    expose:
      - "8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      OMNI_SECRET_KEY: ${OMNI_SECRET_KEY:?set OMNI_SECRET_KEY}
    volumes:
      - ./certs/kubernetes-ca.crt:/run/secrets/kubernetes-ca.crt:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
