apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omni
  namespace: omni
  labels:
    app.kubernetes.io/name: omni
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - host: omni.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omni
                port:
                  number: 80
